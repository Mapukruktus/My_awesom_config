# --- 1. Window & Pane Indexing ---
# Start numbering at 1 (more intuitive for Alt+1, Alt+2)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
# Split panes using | and - (optional but common) or v and h
bind v split-window -h
unbind '"'
unbind %

# Navigate panes using Prefix + h, j, k, l
bind h select-pane -L
bind l select-pane -R
# --- 2. Alt+Number Window Switching ---
# The -n means "no prefix" (just press Alt+1)
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 1
bind-key -n M-7 select-window -t 1
bind-key -n M-8 select-window -t 1
bind-key -n M-9 select-window -t 1

# --- 3. Persistent Directory Logic ---
# Open new windows/panes in the current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
# Kill window: Prefix + &
bind-key & kill-window
# Kill pane: Prefix + x
bind-key x kill-pane
# --- 4. Quality of Life ---
# Easy reload shortcut
bind r source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"
# Enable mouse for scrolling/clicking tabs
set -g mouse on
