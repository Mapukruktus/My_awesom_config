##### CORE #####

# Use true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Faster key response
set -sg escape-time 0

# Mouse support
set -g mouse on

# History
set -g history-limit 100001

# Reload config (Updated to the new XDG path)
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux reloaded ✔"


##### PREFIX #####

# Change prefix to Ctrl-j
set -g prefix C-j
bind C-j send-prefix


##### SPLITS (Vim-like) #####

bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Resize panes (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


##### PANE NAVIGATION #####

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Swap panes
bind < swap-pane -U
bind > swap-pane -D

# Kill pane without confirmation
bind x kill-pane

# Kill window without confirmation
bind X kill-window

##### WINDOWS #####

# Fast window switching
bind -n M-h previous-window
bind -n M-l next-window

# Start window index at 1
set -g base-index 1
setw -g pane-base-index 1


##### ENV FIX (clipboard / nvim / tmux) #####

# Start shells as login shells (fix PATH issues)
set -g default-command "${SHELL} -l"

# Keep display/session variables updated
set -g update-environment "DISPLAY XDG_SESSION_TYPE WAYLAND_DISPLAY XDG_RUNTIME_DIR"

set -g status-position top
##### COPY MODE (Vim keys) #####

setw -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi r send -X rectangle-toggle
# Pick a softer palette.
set -g @catppuccin_flavor 'mocha'

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line more pleasant.
set -g status-left ""
set -g status-right '#[fg=#{@thm_crust},bg=#{@thm_teal}] session: #S '

# Ensure that everything on the right side of the status line
# is included.
set -g status-right-length 100
# Shows [Date] [Time] with colored blocks
# Basic status bar colors
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'

# Left side (Session name)
set -g status-left "#[bg=#b4befe,fg=#1e1e2e,bold] #S "

# Window tabs
# Inactive windows
set -g window-status-style 'bg=#313244,fg=#cdd6f4'
set -g window-status-format " #[fg=#89b4fa]#I #[fg=#cdd6f4]#W "

# Active window (The purple highlight)
set -g window-status-current-style 'bg=#cba6f7,fg=#1e1e2e,bold'
set -g window-status-current-format " #I #W "

# Right side (Date/Time)
set -g status-right "#[fg=#94e2d5,bg=#313244] %Y-%m-%d #[fg=#1e1e2e,bg=#89b4fa,bold] %H:%M "


##### SMART BEHAVIOR #####

set -g detach-on-destroy off
set -g focus-events on


##### PLUGINS (TPM) #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'


# Initialize TPM (Updated path)
run '~/.config/tmux/plugins/tpm/tpm'

##### END #####
