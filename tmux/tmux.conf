# ==============================================================================
# DEFAULT-LOOK TMUX CONFIG (With C-j Prefix)
# ==============================================================================

# Speed up escape key for Neovim
set -s escape-time 0

# Fix colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Enable mouse for resizing
set -g mouse on

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# --- 2. NAVIGATION ---

# A. Move between TABS (Windows) using Alt + h/l 
# No prefix required for these
bind -n M-h previous-window
bind -n M-l next-window

# B. Move between PANES (Splits) using Prefix + hjkl
# You must press Ctrl-j first
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# C. Resize PANES using Prefix + Shift + hjkl
# Press Ctrl-j then H, J, K, or L to resize
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Vim keys for Copy Mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection

# --- 3. SMART SPLITS ---
# Split in current path (v = vertical, s = horizontal)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
set -g allow-passthrough on
# --- 4. THE DEFAULT LOOK (TRANSPARENT & MONOCHROME) ---
set -g status on
set -g status-style "bg=default,fg=default"

# Left side: Session name
set -g status-left "[#S] "
set -g status-right "%H:%M "

# Inactive windows (Plain)
setw -g window-status-style "bg=default,fg=default"
setw -g window-status-format " #I:#W "

# Active (Focused) window 
# We force bg=default to strip the "active" color block
setw -g window-status-current-style "bg=default,fg=default"
setw -g window-status-current-format " #I:#W* "

# Last visited window (Optional - usually shown with a '-')
setw -g window-status-last-style "bg=default,fg=default"

# Pane borders (Set to default to match your solarized terminal)
set -g pane-border-style "fg=default"
set -g pane-active-border-style "fg=default"

# Don't rename windows
set-option -g allow-rename off
